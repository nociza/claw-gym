# Analytics Service Configuration
service:
  name: analytics-service
  version: 2.0.0
  environment: production

server:
  host: 127.0.0.1
  port: 8086
  workers: 6
  debug: false

logging:
  level: warn
  format: json
  output: /var/log/analytics-service/app.log

database:
  host: analytics-db.internal
  port: 5432
  name: analytics_db
  user: analytics_user
  password: ${DB_PASSWORD}
  ssl: true
  pool_size: 30

clickhouse:
  host: clickhouse.internal
  port: 9000
  database: events
  user: analytics
  password: ${CLICKHOUSE_PASSWORD}

# Health check not configured yet - TODO
