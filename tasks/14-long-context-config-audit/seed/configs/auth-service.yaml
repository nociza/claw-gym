# Authentication Service Configuration
service:
  name: auth-service
  version: 1.5.2
  environment: production

server:
  host: 127.0.0.1
  port: 8081
  workers: 2
  debug: true

logging:
  level: debug
  format: json
  output: /var/log/auth-service/app.log

database:
  host: db-primary.internal
  port: 5432
  name: auth_db
  user: auth_admin
  password: "SuperSecret123!"
  ssl: false
  pool_size: 10

jwt:
  secret: "my-jwt-secret-key-do-not-share"
  expiration: 3600
  refresh_expiration: 86400

health_check:
  enabled: true
  path: /health
  interval: 15

oauth:
  google:
    client_id: ${GOOGLE_CLIENT_ID}
    client_secret: ${GOOGLE_CLIENT_SECRET}
  github:
    client_id: ${GITHUB_CLIENT_ID}
    client_secret: ${GITHUB_CLIENT_SECRET}
