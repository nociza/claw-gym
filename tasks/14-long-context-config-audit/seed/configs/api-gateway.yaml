# API Gateway Configuration
service:
  name: api-gateway
  version: 2.1.0
  environment: production

server:
  host: 0.0.0.0
  port: 8080
  workers: 4
  debug: false

logging:
  level: info
  format: json
  output: /var/log/api-gateway/app.log

database:
  host: db-primary.internal
  port: 5432
  name: gateway_db
  user: gateway_user
  password: ${DB_PASSWORD}
  ssl: true
  pool_size: 20

health_check:
  enabled: true
  path: /health
  interval: 30

rate_limiting:
  enabled: true
  requests_per_minute: 1000
  burst: 50

cors:
  allowed_origins:
    - "https://app.example.com"
    - "https://admin.example.com"
